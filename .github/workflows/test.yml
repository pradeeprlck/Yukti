name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install uv
        run: |
          pip install uv
      
      - name: Sync dependencies
        run: uv sync
      
      - name: Run unit tests
        run: uv run pytest tests/unit -v --tb=short
      
      - name: Lint with ruff
        run: uv run ruff check yukti/
      
      - name: Type check (mypy)
        run: uv run mypy yukti/ --ignore-missing-imports || true
